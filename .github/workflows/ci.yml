name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Release check
        run: node scripts/release-check.js

      - name: Evidence ledger check
        run: node scripts/check-evidence.js

      - name: Severity report generation
        run: node scripts/severity-report.js

      - name: Genotype gap audit
        run: node scripts/audit/genotype-gap-audit.js --dry-run
