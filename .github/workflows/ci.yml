name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: node build.js

      - name: Database audit
        run: node scripts/database-audit.js

      - name: Regression check
        run: node scripts/regression-check.js

      - name: Smoke check
        run: node scripts/smoke-check.js
